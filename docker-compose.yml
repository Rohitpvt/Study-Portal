version: "3.9"

services:
  # ── FastAPI Application ──────────────────────────────────────────────────────
  api:
    build: .
    container_name: christ_uni_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/christ_uni
    volumes:
      - ./uploads:/app/uploads
      - ./faiss_index:/app/faiss_index
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - christ_net

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: christ_uni_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: christ_uni
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - christ_net

  # ── PgAdmin (optional dev tool) ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: christ_uni_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@christuniversity.in
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - christ_net
    profiles:
      - dev   # only start with: docker-compose --profile dev up

volumes:
  pgdata:

networks:
  christ_net:
    driver: bridge
